services:
  - type: web
    name: elenaos-api
    runtime: node
    buildCommand: npm install && npx esbuild server.ts --bundle --platform=node --packages=external --outfile=server.cjs
    startCommand: node server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://elena-os.web.app
